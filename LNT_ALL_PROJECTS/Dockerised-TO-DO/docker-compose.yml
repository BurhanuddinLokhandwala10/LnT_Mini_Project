version: '3.8'

services:
  todo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-api-prod
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DEBUG=False
      - API_VERSION=1.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - todo-network
    labels:
      - "com.example.description=Production To-Do API"
      - "com.example.version=1.0.0"

networks:
  todo-network:
    driver: bridge
